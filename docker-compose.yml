# 로컬 개발용 인프라 (PostgreSQL + Redis).
# 운영/스테이징은 Supabase + Upstash. 이 파일은 오직 로컬 한정.
#
# 사용:
#   make infra-up        # 백그라운드 기동
#   make infra-down      # 중지 (볼륨 보존)
#   make infra-clean     # 중지 + 데이터 볼륨 삭제
#   make infra-logs      # 로그 tail
#
# 기본값은 apps/api/src/main/resources/application.yml 의 default 와 일치:
#   db=aistockadvisor, user=dev, password=dev, port 5432 / 6379

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-stock-advisor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aistockadvisor
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d aistockadvisor"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai-stock-advisor-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
    name: ai-stock-advisor-postgres-data
  redis-data:
    name: ai-stock-advisor-redis-data
