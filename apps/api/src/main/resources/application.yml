spring:
  application:
    name: api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/aistockadvisor}
    username: ${DATABASE_USERNAME:dev}
    password: ${DATABASE_PASSWORD:dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 2s
      client-type: lettuce
  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  external:
    finnhub:
      api-key: ${FINNHUB_API_KEY:}
      base-url: https://finnhub.io/api/v1
    twelvedata:
      api-key: ${TWELVE_DATA_API_KEY:}
      base-url: https://api.twelvedata.com
    alphavantage:
      api-key: ${ALPHAVANTAGE_API_KEY:}
      base-url: https://www.alphavantage.co/query
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-1.5-flash}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
      timeout-ms: ${GEMINI_TIMEOUT_MS:8000}
  supabase:
    jwt-secret: ${SUPABASE_JWT_SECRET:}
  legal:
    forbidden-terms-path: ${FORBIDDEN_TERMS_PATH:classpath:legal/forbidden-terms.json}
  cache:
    news-ttl-hours: ${NEWS_CACHE_TTL_HOURS:24}
    ai-signal-ttl-minutes: ${AI_SIGNAL_CACHE_TTL_MINUTES:60}
  ai:
    signal:
      rate-limit-rpm: ${AI_SIGNAL_RATE_LIMIT_RPM:15}

logging:
  level:
    root: INFO
    com.aistockadvisor: ${APP_LOG_LEVEL:INFO}
